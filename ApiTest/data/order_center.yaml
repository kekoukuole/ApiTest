order_list:
  #接口的基本信息
  - request_info:
      case_title: 订单列表接口
      url: /orders/
      method: GET
      headers:
        Content-Type: application/json
    case_info:
      #接口请求参数
      - params:
        validate:
          - length: [ '$..id', 1 ]
        extract:
          order_id: '$.[0].id'



order_detail:
  #接口的基本信息
  - request_info:
      case_title: 订单列表接口
      url: /orders/${get_extract_data(order_id)}/
      method: GET
      headers:
        Content-Type: application/json
    case_info:
      #接口请求参数
      - params:
        validate:
          - contains: [ '$.pay_status', paying ]